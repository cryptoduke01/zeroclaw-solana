name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths: ["site/**", ".github/workflows/site.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

defaults:
  run:
    working-directory: site

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: site/package-lock.json
      # npm install (not ci): Tailwind v4's native/wasm optional deps (@emnapi)
      # drift the lockfile across platforms, which trips ci's strict check.
      - run: npm install --no-audit --no-fund
      - name: Build
        run: npm run build
        env:
          # Pages serves this repo at /onca. Leave unset for a root deploy (Vercel).
          NEXT_PUBLIC_BASE_PATH: /onca
          NEXT_PUBLIC_SITE_URL: https://cryptoduke01.github.io/onca
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
